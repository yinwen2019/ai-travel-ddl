<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Travel DDL — AI 顶会信息聚合展示平台" />
    <title>AI Travel DDL</title>
    <script>
      // 防深色模式闪烁：同步 localStorage 到 <html> class
      (function () {
        const stored = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script type="module" crossorigin src="./assets/index-DHov0ZMr.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BGy4aeB-.css">
  </head>
  <body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="app"></div>
  </body>
</html>
